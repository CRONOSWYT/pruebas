<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lector QR - TimeQRLock</title>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body{
      font-family:Arial,sans-serif;
      background:#e0f7fa;
      padding:20px;
      text-align:center;
    }

    #lector{
      margin:20px auto;
      max-width:400px;
    }

    #resultados{
      margin-top:20px;
      background:white;
      padding:15px;
      border-radius:10px;
      max-width:400px;
      margin-left:auto;
      margin-right:auto;
      box-shadow:0 2px 10px rgba(0,0,0,.1);
      text-align:left;
    }

    select,button{
      padding:10px;
      margin:5px;
      border:none;
      border-radius:8px;
    }

    button{
      background:#00796b;
      color:white;
      cursor:pointer;
    }

    .ok{color:green;font-weight:bold;}
    .fail{color:red;font-weight:bold;}
  </style>
</head>
<body>

<h2>Lector QR - TimeQRLock</h2>

<div id="lector"></div>

<div id="resultados">
  <p><strong>Nombre:</strong> <span id="nombre"></span></p>
  <p><strong>Grado:</strong> <span id="grado"></span></p>
  <p><strong>Documento:</strong> <span id="doc"></span></p>
  <p><strong>Hora:</strong> <span id="hora"></span></p>
  <p id="estado"></p>
  <button id="btnReiniciar" style="display:none; background:#4CAF50; margin-top:20px;" onclick="location.reload()">Reiniciar para siguiente QR</button>
</div>

<script>
// ==================== CONFIGURACIÓN ====================
const SUPABASE_URL = "https://nzhjlkahdelpfaubxjck.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56aGpsa2FoZGVscGZhdWJ4amNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NDM3OTUsImV4cCI6MjA5MjAxOTc5NX0.i48_52r0xsq-EK69k9UNPqTT_BsbgCN3n9mD1I8vOvI";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const clave = "timeqrlock";
const lector = new Html5Qrcode("lector");
let camaraActiva = false;

// ==================== FUNCIONES AUXILIARES ====================
function mostrar(msg, ok){
  const estado = document.getElementById("estado");
  estado.textContent = msg;
  estado.className = ok ? "ok" : "fail";
}

function descifrarQR(qr){
  try{
    const bytes = CryptoJS.AES.decrypt(qr, clave);
    const texto = bytes.toString(CryptoJS.enc.Utf8);
    return JSON.parse(texto);
  }catch(error){
    console.error("Error descifrando QR:", error);
    return null;
  }
}

// ==================== FUNCIONES DE BASE DE DATOS ====================
async function guardarEnSupabase(data){
  try{
    // Obtén la hora actual en formato de 12 horas con zona horaria de Colombia
    const ahora = new Date();
    const fechaLocal = ahora.toLocaleString('es-ES', { 
      timeZone: 'America/Bogota',
      year: 'numeric', 
      month: '2-digit', 
      day: '2-digit',
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit',
      hour12: true
    }).replace(/(\d+)\/(\d+)\/(\d+),\s(\d+):(\d+):(\d+)\s(a\.m\.|p\.m\.)/, '$3-$2-$1 $4:$5:$6 $7');
    
    const { error } = await supabaseClient.from("registros_qr").insert([{
      nombre: data.nombre,
      grado: data.grado,
      documento: data.documento,
      fecha_hora: fechaLocal,
      estado: "Registro correcto"
    }]);

    if(error){
      console.error("Error Supabase:", error);
      mostrar("❌ Error guardando datos", false);
      return false;
    }

    return true;
  }catch(error){
    console.error("Error al guardar:", error);
    mostrar("❌ Error al guardar", false);
    return false;
  }
}

// ==================== FUNCIONES DE CÁMARA ====================
async function procesarQR(qr){
  try{
    const datos = descifrarQR(qr);

    if(!datos || !datos.nombre || !datos.grado || !datos.documento){
      mostrar("❌ QR inválido o incompleto", false);
      // Reinicia la cámara después de un error
      setTimeout(() => iniciarCamara(), 1500);
      return;
    }

    // Detiene la cámara para no leer más QRs
    await lector.stop();
    camaraActiva = false;

    // Actualiza la interfaz
    document.getElementById("nombre").textContent = datos.nombre;
    document.getElementById("grado").textContent = datos.grado;
    document.getElementById("doc").textContent = datos.documento;
    const horaDigital = new Date().toLocaleString('es-ES', {
      timeZone: 'America/Bogota',
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit',
      hour12: true
    });
    document.getElementById("hora").textContent = horaDigital;

    // Guarda en Supabase
    const ok = await guardarEnSupabase(datos);

    if(ok){
      mostrar("✅ Registro correcto", true);
      // Muestra el botón de reinicio
      document.getElementById("btnReiniciar").style.display = "block";
    } else {
      mostrar("❌ Error al guardar", false);
      // Reinicia la cámara si hay error
      setTimeout(() => iniciarCamara(), 1500);
    }
    
  }catch(error){
    console.error("Error procesando QR:", error);
    mostrar("❌ Error procesando QR", false);
    setTimeout(() => iniciarCamara(), 1500);
  }
}

async function iniciarCamara(){
  if(camaraActiva){
    // Si ya está activa, no reinicia
    return;
  }
  
  try{
    // Obtén las cámaras disponibles
    const camaras = await Html5Qrcode.getCameras();
    
    if(camaras.length === 0){
      mostrar("🚫 No hay cámaras disponibles", false);
      // Reintentar cada 3 segundos
      setTimeout(() => iniciarCamara(), 3000);
      return;
    }
    
    const camaraId = camaras[0].id;
    
    // Inicia el lector QR
    await lector.start(
      camaraId,
      { 
        fps: 30,
        qrbox: { width: 250, height: 250 },
        facingMode: 'environment'
      },
      procesarQR
    );
    
    camaraActiva = true;
    console.log("Cámara iniciada correctamente");
    
  }catch(error){
    console.error("Error iniciando cámara:", error);
    camaraActiva = false;
    mostrar("❌ Error al iniciar cámara", false);
    
    // Reintentar después de 3 segundos
    setTimeout(() => iniciarCamara(), 3000);
  }
}

// ==================== INICIALIZACIÓN ====================
async function inicializar(){
  try{
    mostrar("📱 Solicitando acceso a cámara...", true);
    
    // Solicita permiso de cámara
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: 'environment',
        width: { ideal: 1280 },
        height: { ideal: 720 }
      }
    });
    
    // Detén el stream temporal para liberar recursos
    stream.getTracks().forEach(track => track.stop());
    
    mostrar("✅ Permiso concedido", true);
    
    // Inicia la cámara
    await iniciarCamara();
    
  }catch(error){
    console.error("Error al obtener permiso de cámara:", error);
    
    if(error.name === 'NotAllowedError'){
      mostrar("❌ Permiso de cámara denegado. Por favor, acepta los permisos.", false);
    } else if(error.name === 'NotFoundError'){
      mostrar("❌ No se encontró cámara en el dispositivo", false);
    } else {
      mostrar("❌ Error al acceder a la cámara: " + error.message, false);
    }
    
    // Reintentar cada 5 segundos
    setTimeout(() => inicializar(), 5000);
  }
}

// Inicia automáticamente cuando carga la página
window.addEventListener('load', inicializar);
</script>

</body>
</html>
